server.port=8080
server.shutdown=graceful

spring.application.name=library-core

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/library_core_dev?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.pool-name=library-core-pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:5000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.library.default-loan-days=${DEFAULT_LOAN_DAYS:14}
app.library.overdue-fine-per-day=${OVERDUE_FINE_PER_DAY:5.00}
app.security.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
